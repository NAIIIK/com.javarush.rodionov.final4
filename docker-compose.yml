services:
  postgres:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: final4-postgres
    environment:
      POSTGRES_DB: final4
      POSTGRES_USER:
      POSTGRES_PASSWORD:
    ports:
      - "5432:5432"
    entrypoint: ["sh", "-c", "echo 'CREATE SCHEMA IF NOT EXISTS world;' > /docker-entrypoint-initdb.d/init.sql && exec docker-entrypoint.sh postgres"]
    restart: always

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: final4-redis
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    container_name: final4-javarush
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_NAME=final4
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=
      - DB_PASSWORD=
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHECK_QUANTITY=3
      - CHECK_PAUSE_SECONDS=3
    restart: on-failure